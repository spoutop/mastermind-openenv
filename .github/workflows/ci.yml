name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: install deps
        run: uv sync --extra dev

      - name: lint
        run: uv run ruff check .

      - name: tests
        run: PYTHONPATH=. uv run pytest tests/ -q --tb=short

      - name: openenv validate
        run: uv run openenv validate
